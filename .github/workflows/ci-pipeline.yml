name: CI Pipeline

# 1. Trigger (Kapan pipeline dijalankan)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # 2. Menyiapkan Mesin Virtual (Runner)
    runs-on: ubuntu-latest

    steps:
    # 3. Mengambil Kode (Checkout)
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Menyiapkan Environment Java (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 5. Mengecek Kompilasi (Build)
    - name: Compile Code
      run: mvn clean compile
